<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>류우의 사진첩</title>

<style>
body{
  margin:0;
  background:#faf7f2;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.hero{
  height:60vh;
  background:url('KakaoTalk_Photo_2026-06-19-00-58-53-1.jpeg') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.hero h1{
  font-size:2.2rem;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
}

.gallery{
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.gallery img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:95%;
  max-height:90%;
}
</style>
</head>
<body>

<section class="hero">
  <h1>RYUWOO PHOTO ALBUM</h1>
</section>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <img id="big">
</div>

<script>
const photos = [
  ...Array.from({length:32}, (_,i)=>{
    const n=i+1;
    return `KakaoTalk_Photo_2026-06-19-00-58-53-${n}.jpeg`;
  })
];

const gallery=document.getElementById('gallery');

photos.forEach(src=>{
  const img=document.createElement('img');
  img.src=src;

  img.onclick=()=>{
    document.getElementById('modal').style.display='flex';
    document.getElementById('big').src=src;
  };

  gallery.appendChild(img);
});

document.getElementById('modal').onclick=()=>{
  document.getElementById('modal').style.display='none';
};
</script>

</body>
</html>
